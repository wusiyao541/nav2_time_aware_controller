timed_waypoint_runner:
  ros__parameters:
    frame_id: "map"
    action_name: "navigate_to_pose"
    total_loops: 5
    controller_parameter_node: "controller_server"
    controller_target_time_parameter: "FollowPath.desired_segment_time"
    set_controller_target_time: true

    waypoints:
      names: ["goal_1", "goal_2", "goal_3", "goal_4"]

      goal_1:
        x: -3.0
        y: 1.0
        yaw: 3.14
        target_time: 20.0
        dwell_time: 0.0

      goal_2:
        x: -3.0
        y: -3.0
        yaw: -1.57
        target_time: 20.0
        dwell_time: 0.0

      goal_3:
        x: 3.0
        y: -3.0
        yaw: 0.0
        target_time: 20.0
        dwell_time: 0.0

      goal_4:
        x: 3.0
        y: 1.0
        yaw: 1.57
        target_time: 20.0
        dwell_time: 0.0
